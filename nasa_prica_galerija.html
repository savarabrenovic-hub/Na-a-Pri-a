<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naša Priča</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#fdf6ee;--rose:#c9736a;--deep:#1a0f09;--gold:#b8955a}
html,body{width:100%;height:100%;background:#2a1f18;overflow:hidden;font-family:Montserrat,sans-serif;color:var(--cream)}
#intro{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--deep);z-index:100;transition:opacity 1.5s ease}
#intro.fade-out{opacity:0;pointer-events:none}
.io{font-size:1rem;color:var(--gold);letter-spacing:.5em;opacity:.6;margin-bottom:2rem;animation:fu 1s .3s ease both}
.it{font-family:"Cormorant Garamond",serif;font-size:clamp(3rem,12vw,7rem);font-weight:300;line-height:1;text-align:center;animation:fu 1s .5s ease both}
.it em{display:block;font-style:italic;color:var(--rose);font-size:.5em;margin-top:.3em}
.il{width:50px;height:1px;background:var(--gold);margin:2rem auto;animation:si 1s .8s ease both}
.is{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(253,246,238,.4);animation:fu 1s 1s ease both}
.ib{margin-top:3rem;padding:.8rem 2.5rem;border:1px solid rgba(184,149,90,.5);background:transparent;color:var(--gold);font-family:Montserrat,sans-serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;animation:fu 1s 1.2s ease both;transition:background .3s}
.ib:hover{background:rgba(184,149,90,.1)}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 1s ease}
#stage.visible{opacity:1}
.pw{position:absolute;transition:opacity .8s ease,transform 1.2s cubic-bezier(.25,.46,.45,.94);opacity:0;transform:scale(.9) translateY(30px);pointer-events:none}
.pw.active{opacity:1;transform:scale(1) translateY(0) rotate(var(--rot));z-index:10;pointer-events:auto}
.pw.prev{opacity:0;transform:scale(.8) translateX(-80px) translateY(-20px) rotate(calc(var(--rot) - 25deg));z-index:5;transition:opacity .8s ease,transform 1.2s cubic-bezier(.55,0,1,.45);pointer-events:none}
.pw.behind{opacity:.3;transform:scale(.91) translateY(16px) rotate(calc(var(--rot)*-1.2));z-index:8;pointer-events:none}
.po{background:white;padding:14px 14px 50px;box-shadow:0 8px 40px rgba(0,0,0,.55);width:min(360px,84vw)}
.po .pi{width:100%;height:min(290px,50vw);object-fit:contain;object-position:center;display:block;background:#e8e0d8}
.pc{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1rem;color:#3a2a1a;text-align:center;padding-top:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mb{position:fixed;top:1.5rem;right:1.5rem;z-index:50;width:42px;height:42px;border-radius:50%;border:1px solid rgba(184,149,90,.4);background:rgba(0,0,0,.4);color:var(--gold);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#num{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:50;font-size:.55rem;letter-spacing:.2em;color:rgba(253,246,238,.25)}
#pb{position:fixed;bottom:0;left:0;right:0;height:2px;z-index:50;background:rgba(255,255,255,.08)}
#pbr{height:100%;background:var(--gold);width:0;transition:width linear}
#ct{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);display:flex;gap:.3rem;z-index:50;flex-wrap:wrap;justify-content:center;max-width:80vw}
.dt{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s ease;cursor:pointer}
.dt.active{background:var(--gold);transform:scale(1.5)}
.nb{position:fixed;top:50%;transform:translateY(-50%);z-index:50;background:rgba(0,0,0,.3);border:1px solid rgba(184,149,90,.15);color:rgba(253,246,238,.4);width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;border-radius:50%;transition:color .2s,border-color .2s}
.nb:hover{color:var(--gold);border-color:rgba(184,149,90,.4)}
#np{left:.8rem}#nn{right:.8rem}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
</style>
</head>
<body>


<div id="lockscreen" style="position:fixed;inset:0;background:#1a0f09;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,8vw,4rem);font-weight:300;color:#fdf6ee;text-align:center;margin-bottom:0.5rem;">Naša<em style="display:block;font-style:italic;color:#c9736a;font-size:0.5em;">Priča</em></div>
  <div style="width:40px;height:1px;background:#b8955a;margin:1.5rem auto;"></div>
  <input id="pin" type="password" maxlength="4" placeholder="✦ ✦ ✦ ✦" 
    style="background:transparent;border:none;border-bottom:1px solid rgba(184,149,90,0.5);color:#b8955a;font-family:Montserrat,sans-serif;font-size:1.4rem;text-align:center;width:120px;outline:none;letter-spacing:0.5em;padding:0.3rem;">
  <div id="pin-err" style="color:#c9736a;font-size:0.65rem;letter-spacing:0.2em;margin-top:1rem;opacity:0;transition:opacity 0.3s;">Pogrešna šifra</div>
</div>

<div id="intro">
  <div class="io">&#10022; &#10022; &#10022;</div>
  <h1 class="it">Naša<em>Priča</em></h1>
  <div class="il"></div>
  <p class="is">u slikama i trenucima</p>
  <button class="ib" onclick="startShow()">Pogledaj &#8595;</button>
</div>

<div id="stage"></div>
<button id="mb" onclick="toggleMusic()">&#9835;</button>
<div id="num"></div>
<div id="pb"><div id="pbr"></div></div>
<div id="ct"></div>
<button class="nb" id="np" onclick="prev()">&#8249;</button>
<button class="nb" id="nn" onclick="next()">&#8250;</button>

<audio id="audio" preload="auto">
  <source src="mix_6m08s%20%28audio-joiner.com%29.mp3" type="audio/mpeg">
</audio>

<script>
var DUR = 6200;

var SLIDES = [
  {f:'1.%20%C5%A0panija.jpg', l:'Španija'},
  {f:'2.%20Na%C5%A1i%20pogledi.jpg', l:'Naši pogledi'},
  {f:'3.%20Girona.jpg', l:'Girona'},
  {f:'4.%20Kod%20ku%C4%87e.jpg', l:'Kod kuće'},
  {f:'5.%20Rim%20Koloseum.jpg', l:'Rim Koloseum'},
  {f:'6.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'7.%20Bosna.jpg', l:'Bosna'},
  {f:'8.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'9.%20Rim.jpg', l:'Rim'},
  {f:'10.%20Costa%20Brava.jpg', l:'Costa Brava'},
  {f:'11.%20Na%C5%A1i%20pogledi.jpg', l:'Naši pogledi'},
  {f:'12.%20Spremni%20za%20provod.jpg', l:'Spremni za provod'},
  {f:'13.%20Rim.jpg', l:'Rim'},
  {f:'14.%20Rim%20kafi%C4%87.jpg', l:'Rim kafić'},
  {f:'15.%20Costa%20Brava%20pla%C5%BEa.jpg', l:'Costa Brava plaža'},
  {f:'16.%20Lisine.jpg', l:'Lisine'},
  {f:'17.%20Kod%20ku%C4%87e.jpg', l:'Kod kuće'},
  {f:'18.%20Girona.jpg', l:'Girona'},
  {f:'19.%20Rim%20Fontana%20di%20Trevi.jpg', l:'Rim Fontana di Trevi'},
  {f:'20.%20Rim%20%C5%A0panske%20stepenice.jpg', l:'Rim Španske stepenice'},
  {f:'21.%20Costa%20Brava.jpg', l:'Costa Brava'},
  {f:'22.%20Na%20putu.jpg', l:'Na putu'},
  {f:'23.%20Lazareva%20stena.jpg', l:'Lazareva stena'},
  {f:'24.%20Rim.jpg', l:'Rim'},
  {f:'25.%20Rim%20%C5%A0panske%20stepenice.jpg', l:'Rim Španske stepenice'},
  {f:'26.%20Svadba%20mo%C5%BEe%20da%20po%C4%8Dne.jpg', l:'Svadba može da počne'},
  {f:'27.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'28.%20Girona.jpg', l:'Girona'},
  {f:'29.%20Negde.jpg', l:'Negde'},
  {f:'30.%20Javorina.jpg', l:'Javorina'},
  {f:'31.%20Borcha%20City.jpg', l:'Borcha City'},
  {f:'32.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'33.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'34.%20Costa%20Brava.jpg', l:'Costa Brava'},
  {f:'35.%20Lisina.jpg', l:'Lisina'},
  {f:'36.%20Ba%C5%A1%C4%8Dar%C5%A1ija.jpg', l:'Baščaršija'},
  {f:'37.%20Costa%20Brava.jpg', l:'Costa Brava'},
  {f:'38.%20%C5%A0panija.jpg', l:'Španija'},
  {f:'39.%20Rim.jpg', l:'Rim'},
  {f:'40.%20Rim%20Panteon.jpg', l:'Rim Panteon'},
  {f:'41.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'42.%20%C5%A0panija%20restoran.jpg', l:'Španija restoran'},
  {f:'43.%20Daj%20mi.jpg', l:'Daj mi'},
  {f:'44.%20Rim.jpg', l:'Rim'},
  {f:'45.%20Rim%20Fontana%20di%20Trevi.jpg', l:'Rim Fontana di Trevi'},
  {f:'46.%20Na%C5%A1i%20pogledi.jpg', l:'Naši pogledi'},
  {f:'47.%20Na%C5%A1i%20momenti.jpg', l:'Naši momenti'},
  {f:'48.%20Lisine.jpg', l:'Lisine'},
  {f:'49.Girona.jpg', l:'Girona'},
  {f:'50.%20Fi%C4%87ka.jpg', l:'Fićka'},
  {f:'51.%20Rim.jpg', l:'Rim'},
  {f:'52.%20%C5%A0panija.jpg', l:'Španija'},
  {f:'53.%20Beograd.jpg', l:'Beograd'},
  {f:'54.%20%C4%8Cekaju%C4%87i%20nudle.jpg', l:'Čekajući nudle'},
  {f:'55.%20Costa%20Brava.jpg', l:'Costa Brava'},
  {f:'56.%20Lazareva%20stena.jpg', l:'Lazareva stena'},
  {f:'57.%20Slika%20u%20slici%20govori%20vi%C5%A1e%20od%201000%20re%C4%8Di.jpg', l:'Slika u slici govori više od 1000 reči'},
  {f:'58.%20Costa%20Brava.jpg', l:'Costa Brava'},
];

var ROTS=[-2,-1.5,-0.8,0,0.8,1.5,2,-1.2,1.2,-0.4,2.2,-1.8,0.5,-2.5,1.8,-0.6,1.1,-1.4,2.4,-0.9,0.7,-2.1,1.6,-0.3,2.8,-1,0.4,-2.3,1.3,-0.7,-2.2,1.7,-0.5,2.1,-1.1,0.6,-2.4,1.4,-0.2,2.6,-1.9,0.3,-2.6,1.9,-0.1,2.3,-1.3,0.8,-2.8,1.5,-0.7,2.5,-1.6,0.2,-2.9,1.8,-0.4,2.7];

var stg=document.getElementById('stage');
var ctr=document.getElementById('ct');
var bar=document.getElementById('pbr');
var numEl=document.getElementById('num');
var mbtn=document.getElementById('mb');
var audio=document.getElementById('audio');

SLIDES.forEach(function(s,idx){
  var w=document.createElement('div');
  w.className='pw';
  w.style.setProperty('--rot',ROTS[idx%ROTS.length]+'deg');
  w.innerHTML='<div class="po"><img class="pi" src="'+s.f+'" alt="'+s.l+'" loading="lazy"><div class="pc">'+s.l+'</div></div>';
  stg.appendChild(w);
  var dt=document.createElement('div');
  dt.className='dt'+(idx===0?' active':'');
  (function(n){dt.onclick=function(){goTo(n);};})(idx);
  ctr.appendChild(dt);
});

var ws=document.querySelectorAll('.pw');
var ds=document.querySelectorAll('.dt');
var cur=0,pl=false,tmr=null;

function updateNum(){numEl.textContent=(cur+1)+' / '+SLIDES.length;}

function goTo(n){
  ws[cur].classList.remove('active');ws[cur].classList.add('prev');
  ds[cur].classList.remove('active');
  for(var i=0;i<ws.length;i++)ws[i].classList.remove('behind');
  var old=cur;
  (function(o){setTimeout(function(){ws[o].classList.remove('prev');},1200);})(old);
  cur=(n+SLIDES.length)%SLIDES.length;
  ws[cur].classList.add('active');ds[cur].classList.add('active');
  ws[(cur+1)%SLIDES.length].classList.add('behind');
  updateNum();resetTimer();
}

function next(){goTo(cur+1);}
function prev(){goTo(cur-1);}

function startTimer(){
  bar.style.transition='none';bar.style.width='0%';
  setTimeout(function(){bar.style.transition='width '+DUR+'ms linear';bar.style.width='100%';},50);
  tmr=setTimeout(next,DUR);
}
function resetTimer(){clearTimeout(tmr);startTimer();}

function toggleMusic(){
  if(pl){audio.pause();pl=false;mbtn.textContent='\u266B';}
  else{audio.play().catch(function(){});pl=true;mbtn.textContent='\u23F8';}
}

function startShow(){
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(function(){
    document.getElementById('intro').style.display='none';
    stg.classList.add('visible');
    cur=0;ws[0].classList.add('active');ds[0].classList.add('active');
    if(ws.length>1)ws[1].classList.add('behind');
    updateNum();startTimer();
    audio.play().then(function(){pl=true;mbtn.textContent='\u23F8';}).catch(function(){});
  },1500);
}

document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
document.addEventListener('touchstart',function(e){window._tx=e.touches[0].clientX;});
document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-window._tx;if(Math.abs(dx)>50){if(dx<0)next();else prev();}});
</script>

<script>
document.getElementById('pin').addEventListener('input', function() {
  if (this.value === '1605') {
    document.getElementById('lockscreen').style.display = 'none';
  } else if (this.value.length === 4) {
    document.getElementById('pin-err').style.opacity = '1';
    var t = this;
    setTimeout(function(){ t.value=''; document.getElementById('pin-err').style.opacity='0'; }, 800);
  }
});
document.getElementById('pin').focus();
</script>

</body>
</html>
